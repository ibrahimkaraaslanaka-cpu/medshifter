name: Supabase Keep-Alive

on:
  schedule:
    # Her 5 günde bir, UTC 08:00'de çalışır (TR saati 11:00)
    - cron: '0 8 */5 * *'
  workflow_dispatch: # Manuel tetikleme

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent INACTIVE
        run: |
          echo "🏥 Med Shifter - Supabase Keep-Alive Ping"
          
          # Supabase REST API health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=count&limit=1")
          
          echo "Response status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Supabase is alive and responding!"
          else
            echo "⚠️ Supabase returned status $HTTP_STATUS"
            exit 1
          fi
