# Med Shifter - Nginx Configuration
# Place this in /etc/nginx/sites-available/medshifter

server {
    listen 80;
    server_name medshifter.app www.medshifter.app;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medshifter.app www.medshifter.app;

    # SSL Configuration (adjust paths as needed)
    ssl_certificate /etc/letsencrypt/live/medshifter.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medshifter.app/privkey.pem;

    # Root directory
    root /var/www/medshifter;
    index index.html;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Shared calendar view - serve view.html for /view/<token> URLs
    location /view/ {
        try_files /view.html =404;
    }

    # Clean URLs - Try without .html extension
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # API Proxy to Node.js backend
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static file caching (no immutable — files have no content hash)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
