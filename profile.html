<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med Shifter - Profilim</title>
    <meta name="description" content="Med Shifter profil sayfası. Takvimlerinizi ve hesap bilgilerinizi yönetin.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --primary-light: #e0f2fe;
            --accent: #8b5cf6;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: white;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-light) 50%, #1a1a2e 100%);
            z-index: -2;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            top: -100px;
            right: -100px;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            bottom: -100px;
            left: -100px;
        }

        /* Header */
        .header {
            padding: 1.5rem 2rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
        }

        .logo-icon {
            font-size: 1.75rem;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--primary);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: white;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Main Content */
        .main {
            padding: 7rem 2rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2rem;
        }

        /* Grid Layout */
        .profile-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Card Styles */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Profile Card */
        .profile-card {
            text-align: center;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }

        .profile-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .profile-email {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .plan-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .plan-badge.free {
            background: rgba(100, 116, 139, 0.3);
            color: #94a3b8;
        }

        .plan-badge.individual {
            background: rgba(14, 165, 233, 0.3);
            color: #7dd3fc;
        }

        .plan-badge.business {
            background: rgba(139, 92, 246, 0.3);
            color: #c4b5fd;
        }

        /* Usage Card */
        .usage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .usage-item:last-child {
            border-bottom: none;
        }

        .usage-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .usage-value {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .usage-value.warning {
            color: var(--warning);
        }

        .usage-value.danger {
            color: var(--error);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .progress-fill.warning {
            background: var(--warning);
        }

        .progress-fill.danger {
            background: var(--error);
        }

        /* Calendars Section */
        .calendars-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        /* Calendar List */
        .calendar-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .calendar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .calendar-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .calendar-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .calendar-icon {
            width: 40px;
            height: 40px;
            background: rgba(14, 165, 233, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .calendar-title {
            font-weight: 500;
            margin-bottom: 0.15rem;
        }

        .calendar-date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .calendar-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-icon.view {
            background: rgba(14, 165, 233, 0.2);
            color: var(--primary);
        }

        .btn-icon.view:hover {
            background: rgba(14, 165, 233, 0.3);
        }

        .btn-icon.delete {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .btn-icon.delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state p {
            margin-bottom: 1.5rem;
        }

        /* Loading */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Upgrade Banner */
        .upgrade-banner {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(14, 165, 233, 0.2) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 1.25rem;
            margin-top: 1rem;
            text-align: center;
        }

        .upgrade-banner p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }

        .btn-upgrade {
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
            color: white;
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-upgrade:hover {
            transform: translateY(-1px);
        }

        /* Mobile Nav */
        @media (max-width: 768px) {
            .nav {
                display: none;
            }

            .header-content {
                padding: 0;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>

    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <div class="logo-icon">🏥</div>
                <div class="logo-text">Med<span>Shifter</span></div>
            </a>
            <nav class="nav">
                <a href="/">Ana Sayfa</a>
                <a href="/pricing">Fiyatlandırma</a>
                <a href="/app">Uygulama</a>
            </nav>
            <div class="user-menu">
                <div class="user-avatar" id="headerAvatar">?</div>
                <button class="btn-logout" onclick="logout()">Çıkış Yap</button>
            </div>
        </div>
    </header>

    <main class="main">
        <h1 class="page-title">Profilim</h1>
        <p class="page-subtitle">Hesap bilgilerinizi ve takvimlerinizi yönetin</p>

        <div class="profile-grid">
            <!-- Left Column -->
            <div class="sidebar">
                <!-- Profile Card -->
                <div class="card profile-card">
                    <div class="profile-avatar" id="profileAvatar">?</div>
                    <div class="profile-name" id="profileName">Yükleniyor...</div>
                    <div class="profile-email" id="profileEmail">...</div>
                    <span class="plan-badge free" id="planBadge">FREE</span>
                </div>

                <!-- Usage Card -->
                <div class="card" style="margin-top: 1rem;">
                    <h3 class="card-title">📊 Kullanım Durumu</h3>
                    <div id="usageContent">
                        <div class="loading-spinner">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>

                <!-- Upgrade Banner (only for free users) -->
                <div class="upgrade-banner" id="upgradeBanner" style="display: none;">
                    <p>Daha fazla özellik için planınızı yükseltin!</p>
                    <a href="/pricing" class="btn-upgrade">Planları Gör</a>
                </div>
            </div>

            <!-- Right Column - Calendars -->
            <div class="calendars-section">
                <div class="card">
                    <div class="calendars-header">
                        <h3 class="card-title">📅 Takvimlerim</h3>
                        <a href="/app" class="btn btn-primary">+ Yeni Takvim</a>
                    </div>
                    <div class="calendar-list" id="calendarList">
                        <div class="loading-spinner">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js?v=2.0.2"></script>
    <script>
        const API_URL = window.AppConfig?.API_URL || 'http://localhost:3001/api';
        const supabaseClient = window.supabase.createClient(
            window.AppConfig.SUPABASE_URL,
            window.AppConfig.SUPABASE_ANON_KEY
        );
        let currentUser = null;
        let currentUsage = null;
        let currentToken = null;

        // Check authentication via Supabase session
        async function checkAuth() {
            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                if (error || !session) {
                    window.location.href = '/login';
                    return false;
                }

                currentToken = session.access_token;

                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                if (!response.ok) {
                    throw new Error('Unauthorized');
                }

                const data = await response.json();
                currentUser = data.user;
                currentUsage = data.usage;
                return true;
            } catch (error) {
                console.error('Auth check failed:', error);
                await supabaseClient.auth.signOut();
                window.location.href = '/login';
                return false;
            }
        }

        function renderProfile() {
            if (!currentUser) return;

            const initials = currentUser.name
                ? currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2)
                : currentUser.email[0].toUpperCase();

            // Header avatar
            const headerAvatar = document.getElementById('headerAvatar');
            if (currentUser.avatar) {
                headerAvatar.innerHTML = `<img src="${currentUser.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="Avatar">`;
            } else {
                headerAvatar.textContent = initials;
            }

            // Profile avatar
            const profileAvatar = document.getElementById('profileAvatar');
            if (currentUser.avatar) {
                profileAvatar.innerHTML = `<img src="${currentUser.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="Avatar">`;
            } else {
                profileAvatar.textContent = initials;
            }

            document.getElementById('profileName').textContent = currentUser.name || 'Kullanıcı';
            document.getElementById('profileEmail').textContent = currentUser.email;

            const planBadge = document.getElementById('planBadge');
            const plan = currentUser.plan || 'FREE';
            planBadge.textContent = plan === 'INDIVIDUAL' ? 'BİREYSEL' :
                plan === 'BUSINESS' ? 'BUSINESS' : 'ÜCRETSİZ';
            planBadge.className = 'plan-badge ' + plan.toLowerCase();

            // Show upgrade banner for free users
            if (plan === 'FREE') {
                document.getElementById('upgradeBanner').style.display = 'block';
            }
        }

        function renderUsage() {
            const container = document.getElementById('usageContent');

            if (!currentUsage) {
                container.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center;">Kullanım bilgisi alınamadı</p>';
                return;
            }

            const { limits, usage, remaining } = currentUsage;

            const items = [
                { label: 'Takvim', used: usage.calendarsUsed, limit: limits.calendarsPerMonth },
                { label: 'Versiyon', used: usage.versionsUsed, limit: limits.versionsPerMonth }
            ];

            container.innerHTML = items.map(item => {
                const percentage = (item.used / item.limit) * 100;
                const status = percentage >= 100 ? 'danger' : percentage >= 75 ? 'warning' : '';

                return `
                    <div class="usage-item">
                        <span class="usage-label">${item.label}</span>
                        <span class="usage-value ${status}">${item.used} / ${item.limit}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${status}" style="width: ${Math.min(percentage, 100)}%"></div>
                    </div>
                `;
            }).join('');

            // Add limits info
            container.innerHTML += `
                <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
                    <div class="usage-item">
                        <span class="usage-label">Personel Limiti</span>
                        <span class="usage-value">${limits.peopleLimit}</span>
                    </div>
                    <div class="usage-item">
                        <span class="usage-label">Koşul Limiti</span>
                        <span class="usage-value">${limits.conditionsLimit}</span>
                    </div>
                </div>
            `;
        }

        async function loadCalendars() {
            const container = document.getElementById('calendarList');

            try {
                const response = await fetch(`${API_URL}/calendars`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to load calendars');
                }

                const data = await response.json();
                const calendars = data.calendars || [];

                if (calendars.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📅</div>
                            <p>Henüz takvim oluşturmadınız</p>
                            <a href="/app" class="btn btn-primary">İlk Takvimi Oluştur</a>
                        </div>
                    `;
                    return;
                }

                const monthNames = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran',
                    'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];

                container.innerHTML = calendars.map(cal => `
                    <div class="calendar-item" data-id="${cal.id}">
                        <div class="calendar-info">
                            <div class="calendar-icon">📅</div>
                            <div>
                                <div class="calendar-title">${cal.title}</div>
                                <div class="calendar-date">${monthNames[cal.month]} ${cal.year} • ${formatDate(cal.createdAt)}</div>
                            </div>
                        </div>
                        <div class="calendar-actions">
                            <button class="btn-icon view" onclick="loadCalendar('${cal.id}')" title="Görüntüle">👁️</button>
                            <button class="btn-icon delete" onclick="deleteCalendar('${cal.id}')" title="Sil">🗑️</button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Failed to load calendars:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Takvimler yüklenemedi. Sunucu bağlantısını kontrol edin.</p>
                    </div>
                `;
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('tr-TR', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });
        }

        async function loadCalendar(id) {
            localStorage.setItem('medshifter_load_calendar', id);
            window.location.href = '/app';
        }

        async function deleteCalendar(id) {
            if (!confirm('Bu takvimi silmek istediğinizden emin misiniz?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/calendars/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                if (!response.ok) {
                    throw new Error('Silme başarısız');
                }

                loadCalendars();
            } catch (error) {
                alert('Takvim silinemedi: ' + error.message);
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = '/login';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            const isAuthed = await checkAuth();
            if (isAuthed) {
                renderProfile();
                renderUsage();
                loadCalendars();
            }
        });
    </script>
</body>

</html>
